name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CellSentry Version
      description: Check Settings → About → Version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: What did you do?
      placeholder: |
        1. Open CellSentry
        2. Drag an .xlsx file onto the drop zone
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, error messages, or anything else that might help
    validations:
      required: false
