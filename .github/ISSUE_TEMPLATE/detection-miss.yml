name: Detection Miss
description: Report a formula, PII pattern, or document that CellSentry missed or misclassified
labels: ["detection-miss", "training-data"]
body:
  - type: dropdown
    id: scan-mode
    attributes:
      label: Scan Mode
      options:
        - Formula Audit
        - PII Detection
        - Data Extraction
    validations:
      required: true
  - type: textarea
    id: pattern
    attributes:
      label: Pattern Description
      description: |
        Describe the formula, PII pattern, or document structure that was missed.

        **Do NOT paste real data.** Describe the pattern instead.
        Example: "VLOOKUP nested inside IF with a cross-sheet reference"
        Example: "Phone number formatted as +86-xxx-xxxx-xxxx"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Result
      description: What should CellSentry have detected or classified?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Result
      description: What did CellSentry report (or fail to report)?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CellSentry Version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy Confirmation
      options:
        - label: I confirm this report contains no real personal or sensitive data
          required: true
